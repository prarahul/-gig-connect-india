databases:
  - name: gig-connect-india-db
    plan: free

services:
  - type: web
    name: gig-connect-india
    runtime: node
    plan: free
    rootDir: .
    buildCommand: PORT=10000 BASE_PATH=/ corepack pnpm --filter @workspace/gig-connect-india run build && PORT=10001 BASE_PATH=/admin/ corepack pnpm --filter @workspace/admin-portal run build && corepack pnpm --filter @workspace/api-server run build
    startCommand: corepack pnpm --filter @workspace/api-server run start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gig-connect-india-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_EMAIL
        value: rahulpraskt@gmail.com
      - key: FROM_EMAIL
        value: onboarding@resend.dev